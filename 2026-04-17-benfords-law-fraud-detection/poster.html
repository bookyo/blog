<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article Poster</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Outfit', sans-serif; }
.mono { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body class="bg-black flex items-center justify-center min-h-screen">
  <div class="w-[1080px] text-center px-[108px] py-24">
    <!-- Main focal point: Benford's Law formula -->
    <p class="text-[28px] font-bold text-[#00FF94] tracking-widest uppercase mb-6">Benford's Law</p>
    
    <!-- The key numbers - center focal point -->
    <div class="flex items-baseline justify-center gap-8 mb-6">
      <div class="text-center">
        <span class="text-[120px] font-black text-white leading-none">30.1</span>
        <span class="text-[60px] font-bold text-white">%</span>
        <p class="text-[22px] text-[#888888] mt-2">digit 1</p>
      </div>
      <div class="text-[60px] text-[#444444] font-light">vs</div>
      <div class="text-center">
        <span class="text-[120px] font-black text-white leading-none">4.6</span>
        <span class="text-[60px] font-bold text-white">%</span>
        <p class="text-[22px] text-[#888888] mt-2">digit 9</p>
      </div>
    </div>

    <!-- Secondary: the insight -->
    <p class="text-[36px] font-semibold text-[#FFFFFF] mt-8 leading-tight">The First Digit Law</p>
    
    <!-- Description -->
    <p class="text-[18px] text-[#666666] mt-8 leading-relaxed max-w-[700px] mx-auto">In naturally occurring data, small digits appear first more often. A mathematical pattern that powers fraud detection worldwide.</p>
    
    <!-- Bottom branding -->
    <div class="mt-16 pt-8 border-t border-[#222222]">
      <p class="text-[14px] text-[#444444] tracking-widest uppercase">ElysiaTools.com</p>
    </div>
  </div>
</body>
</html>
